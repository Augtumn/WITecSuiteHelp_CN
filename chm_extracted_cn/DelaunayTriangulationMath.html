<p class=rvps1><span class=rvts2>从二维空间中的一组点开始，Delaunay三角剖分创建一个三角形网格。该网格始终是所有点的凸区域。在每个点处存储附加信息。这些信息与点的坐标一起允许在点之间的自由空间中进行插值。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>

<p class=rvps2><span class=rvts3>局部仿射变换</span></p>
<p class=rvps2><span class=rvts2>结合</span><a class=rvts5 href="AffineTransformationMath.html">仿射变换</a><span class=rvts2>，可以定义一个描述局部变形的网格。旧的坐标点用于三角剖分，新的坐标点作为附加信息。这允许计算三角形内部的变形。</span></p>
