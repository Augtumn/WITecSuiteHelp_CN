<p class=rvps3><span class=rvts2>此参数组允许记录具有扩展光谱范围的单光谱。因此，光栅移动到不同的光谱位置以覆盖定义的范围。数据组合为一个光谱。</span></p>
<p class=rvps1><span class=rvts3>更多信息（操作指南）：</span></p>
<ul style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li class=rvps1><a class=rvts4 href="OGRamanOverview.html">拉曼</a></li>
</ul>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps2><img border="0" src="Images/image172745238.jpg" width="364" height="101"></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts3>开始拼接 </span></p>
<p class=rvps1><span class=rvts2>按下此按钮，将使用当前参数开始采集。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts3>积分时间</span></p>
<p class=rvps1><span class=rvts2>此参数定义每个光谱位置的积分时间。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts3>累积次数</span></p>
<p class=rvps1><span class=rvts2>此参数描述每个光谱位置将累积多少个光谱。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts3>起始位置 </span></p>
<p class=rvps1><span class=rvts2>定义结果光谱的光谱范围的起始位置，使用&nbsp;</span><a class=rvts4 href="WCSpectrograph.html">光谱仪</a><span class=rvts2>&nbsp;部分中定义的光谱单位。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts3>停止位置</span></p>
<p class=rvps1><span class=rvts2>定义结果光谱的光谱范围的终止位置，使用&nbsp;</span><a class=rvts4 href="WCSpectrograph.html">光谱仪</a><span class=rvts2>&nbsp;部分中定义的光谱单位。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
