<p class=rvps1><span class=rvts2>文本 查看器可以显示&nbsp;</span><a class=rvts3 href="TextData.html">文本数据对象</a><span class=rvts2>，其中包含富文本格式 (RTF) 的文本。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts2>只需双击文本对象即可创建文本查看器。如果该文本对象已在文本查看器中显示，则不会创建新的查看器，而是将现有的文本查看器置于所有窗口的最前面。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts2>您可以在文本查看器中输入、格式化、复制和粘贴文本。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts2>可以将一个或多个文本对象导出为 .txt (ASCII) 或 .rtf (富文本格式) 文件，请参阅&nbsp;</span><span class=rvts4>导出</span><span class=rvts2>&nbsp;</span><a class=rvts3 href="ExportOverview.html">导出概述。</a></p>
