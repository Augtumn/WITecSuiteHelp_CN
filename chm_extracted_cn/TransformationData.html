<p class=rvps1><span class=rvts2>变换数据对象用于将像素位置转换为真实的物理位置。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts2>有不同类型的变换对象：</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<ul style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li class=rvps1><span class=rvts3>空间变换：</span>
<br><span class=rvts2>将图像/位图/图谱图像的像素位置（x,y）转换为真实空间坐标；</span>
<br><span class=rvts2>使用空间解释（参见&nbsp;</span><a class=rvts4 href="SpatialTransformationMath.html">空间变换（数学）</a><span class=rvts2>）。</span></li>
</ul>
<p class=rvps1><span class=rvts2><br></span></p>
<ul style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li class=rvps1><span class=rvts3>光谱变换：</span>
<br><span class=rvts2>将光谱图谱对象的x轴像素位置转换为光谱单位（例如相对波数）；</span>
<br><span class=rvts2>使用光谱解释。</span></li>
</ul>
<p class=rvps1><span class=rvts2><br></span></p>
<ul style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li class=rvps1><span class=rvts3>线性变换</span>
<br><span class=rvts2>将图谱对象的x轴或线图谱像素位置转换为真实单位；</span>
<br><span class=rvts2>使用例如时间、频率、相位解释。</span></li>
</ul>
