<p class=rvps2><span class=rvts5>提升模式是一种双通道技术，将样品表面的AC模式扫描线与表面上方指定高度的扫描线交错进行。在此位置，可以测量悬臂梁上的力，排除形貌的影响。</span></p>
<p class=rvps1><span class=rvts3><br></span></p>

<ul style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li class=rvps1><a class=rvts6 href="OGAFMLiftModeMFMOverview.html">磁力显微镜（MFM）</a></li>
<li class=rvps1><a class=rvts7 href="OGAFMLiftModeEFMOverview.html">静电力显微镜（EFM）</a></li>
<li class=rvps1><a class=rvts6 href="OGAFMLiftModeParameters.html">设置测量</a></li>

</ul>

<ul style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li class=rvps1><a class=rvts8 href="WCImageScanMultipass.html">图像扫描（多通道）</a><span class=rvts2>：采集AFM AC提升模式图像</span></li>
<li class=rvps1><a class=rvts8 href="WCImageScan.html">图像扫描</a><span class=rvts2>：采集AFM AC模式图像（仅用于优化参数）</span></li>
