<p class=rvps1><span class=rvts2>您可以通过多种方式导出数据：</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<ul style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li class=rvps1><a class=rvts4 href="ExportDataObjects.html">导出数据对象</a><span class=rvts2>&nbsp;到一个或多个文件或剪贴板中。</span></li>
</ul>
<p class=rvps1><span class=rvts2><br></span></p>
<ul style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li class=rvps1><span class=rvts2>从&nbsp;</span><span class=rvts3>查看器</span><span class=rvts2>&nbsp;中导出当前的&nbsp;</span><span class=rvts3>绘图/位图</span><span class=rvts2>&nbsp;甚至ASCII数据。</span>
<br><span class=rvts2>参见&nbsp;</span><a class=rvts4 href="GraphViewerExport.html">图谱查看器导出</a><span class=rvts2>&nbsp;或&nbsp;</span><a class=rvts4 href="ImageViewerExport.html">图像查看器导出。</a></li>
</ul>
<p class=rvps1><span class=rvts2><br></span></p>
<ul style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li class=rvps1><span class=rvts2>将数据二进制导出为自定义的公开&nbsp;</span><a class=rvts4 href="WITecBinaryExportFormat.html">WITec二进制导出格式。</a>
<br><span class=rvts2>要执行整个项目的二进制导出，请从主菜单中选择"</span><span class=rvts3>文件 > 二进制导出"</span><span class=rvts2>。</span>
<br><span class=rvts2>要执行项目管理器中选定项的二进制导出，请打开项目管理器上下文菜单并选择"</span><span class=rvts3>文件 > 二进制导出选定数据"</span><span class=rvts2>。</span></li>
</ul>
