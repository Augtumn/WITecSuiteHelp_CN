<p class=rvps3><span class=rvts2>在图像扫描（多通道）参数组中，可以定义双通道提升模式扫描所需的参数。扫描几何形状或扫描速度等参数可以在&nbsp;</span><a class=rvts4 href="WCImageScan.html">图像扫描</a><span class=rvts2>&nbsp;参数组中调整。更多信息可在操作指南的&nbsp;</span><a class=rvts4 href="OGAFMLiftModeOverview.html">提升模式</a><span class=rvts2>&nbsp;和&nbsp;</span><a class=rvts4 href="OGAFMKPFMOverview.html">KPFM</a><span class=rvts2>&nbsp;部分找到。</span></p>

<p class=rvps2><span class=rvts3>开始多通道扫描</span></p>
<p class=rvps2><span class=rvts2>按下此按钮使用此处和&nbsp;</span><a class=rvts4 href="WCImageScan.html">图像扫描</a><span class=rvts2>&nbsp;部分中当前输入的参数开始多通道扫描和数据采集。</span></p>
<p class=rvps2><span class=rvts2><br></span></p>
<p class=rvps2><span class=rvts3>第二通道 Z 偏移 [nm]</span></p>
<p class=rvps2><span class=rvts2>此参数定义第二通道相对于第一通道记录的形貌的高度。</span></p>
<p class=rvps2><span class=rvts2><br></span></p>
<p class=rvps2><span class=rvts3>前视 [%]</span></p>
