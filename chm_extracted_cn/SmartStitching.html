<p class=rvps1><span class=rvts2>智能拼接可用于通过简单定义图像数量来测量当前位置周围的拼接图像。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><img border="0" src="Images/image1780852413.jpg" width="419" height="105"></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts3>图像数量</span></p>
<p class=rvps1><span class=rvts2>在此设置拼接的图像数量 [n x n]。</span></p>
<p class=rvps1><span class=rvts2>根据所选物镜的不同，图像数量决定了拼接图像的总尺寸。</span></p>
<p class=rvps1><span class=rvts2>您可以使用数字编辑框、箭头按钮或游戏手柄按钮 X 和 Y 来增加或减少图像数量。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts3>使用焦点堆栈</span></p>
<p class=rvps1><span class=rvts2>如果选中，则使用当前的</span><a class=rvts4 href="VideoMeasurementOverview.html#FocusStacking">焦点堆栈范围</a><span class=rvts2>为每张单独图像执行焦点堆栈。</span></p>
