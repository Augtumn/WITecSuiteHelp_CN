<p class=rvps3><span class=rvts3>合理性</span></p>
<p class=rvps3><span class=rvts2>初始基光谱集只是整个可能向量空间的一个子空间。通过减去或加上光谱，不可能离开该子空间，即该过程不能创建新的组分。</span></p>
