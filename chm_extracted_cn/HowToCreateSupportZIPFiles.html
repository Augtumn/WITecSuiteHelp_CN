<p class=rvps1><span class=rvts2>您可以创建一个包含所有日志文件和计算机信息的支持ZIP文件，以帮助WITec支持人员查找软件问题。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts2>要创建支持ZIP文件，只需前往WITec项目/Control/TrueMatch的主菜单并选择</span></p>
<p class=rvps1><span class=rvts3><br></span></p>
<p class=rvps1><span class=rvts3>帮助 -&gt; 创建支持ZIP文件</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts2>（在显微镜计算机上，也可以使用&nbsp;</span><a class=rvts4 href="WITecServiceMonitorOverview.html">WITec Service Monitor</a><span class=rvts2>）</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts2>在此您可以选择要压缩的数据。为了获得最佳支持，请将全部数据发送给我们：</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><img border="0" src="Images/image1454899773.jpg" width="400" height="295"></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts2>现在按下&nbsp;</span><span class=rvts5>确定</span><span class=rvts2>。将创建一个新的ZIP文件。请将此ZIP文件发送给您的WITec支持联系人。</span></p>
