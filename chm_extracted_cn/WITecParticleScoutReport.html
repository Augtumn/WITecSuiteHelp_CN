<p class=rvps1><span class=rvts2>报告视图允许您使用以下元素定义报告布局：</span></p>
<ul style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li class=rvps1><span class=rvts2>带图例的颗粒图像（地图）</span></li>
<li class=rvps1><span class=rvts2>带缩略图和光谱的典型颗粒</span></li>
<li class=rvps1><span class=rvts2>带图例的条形图</span></li>
<li class=rvps1><span class=rvts2>带图例的饼图</span></li>
<li class=rvps1><span class=rvts2>带分类的表格</span></li>
</ul>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts2>生成的报告视图可以作为位图导出到Windows剪贴板。</span></p>
<p class=rvps1><span class=rvts5><br></span></p>
