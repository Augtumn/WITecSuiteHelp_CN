<p class=rvps1><span class=rvts2>&nbsp;</span><a class=rvts6 href="WCFeedbackSettings.html">反馈设置</a><span class=rvts2>&nbsp;允许访问与扫描台Z轴的PI控制结合使用的参数。</span></p>
<p class=rvps4><img border="0" src="Images/image1594154940.jpg" width="424" height="228"></p>
<p class=rvps3><span class=rvts3>图1：PI控制器的示意图</span></p>
<p class=rvps1><span class=rvts2>图1示意性地说明了该数字控制器的功能原理。一个可调的设点值首先与一个可选的PI控制通道进行比较。由此产生的控制偏差与比例放大器和积分器一起用于计算扫描台Z轴的控制信号，以最小化控制偏差。</span></p>
