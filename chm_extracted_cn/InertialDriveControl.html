<p class=rvps3><span class=rvts2>惯性驱动用于移动悬臂梁、激光输出调整镜或辅助设备。</span></p>
<p class=rvps3><span class=rvts2>可以使用&nbsp;</span><a class=rvts4 href="UIJoystickControl.html">UI摇杆控制</a><span class=rvts2>&nbsp;或&nbsp;</span><a class=rvts4 href="EasyLinkController.html">EasyLink控制器</a><span class=rvts2>&nbsp;来移动惯性驱动。</span></p>
<p class=rvps3><span class=rvts2>按下箭头将执行单步移动。</span></p>
<p class=rvps3><span class=rvts2>如果轴移动不对称或某个方向根本不移动，请打开选项并调整平衡或步长：</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
