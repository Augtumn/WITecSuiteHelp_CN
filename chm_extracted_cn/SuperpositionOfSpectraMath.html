<p class=rvps1><span class=rvts2>描述高光谱数据集的模型之一基于叠加原理。通常，高光谱数据集中的光谱是来自不同组分的混合光谱。每个组分指向高维向量空间的不同方向。这些光谱或它们的线性组合形成了一个基，该基仅描述完整向量空间的一个子空间。利用这个基，所有测量光谱都可以描述为线性组合。</span>
<br><span class=rvts2>此外，引入了一个对所有数据集光谱都相同的常光谱。数据采集中的噪声和无法描述的信号将被添加到误差中。请阅读&nbsp;</span><a class=rvts4 href="HyperSpectralDatasetGeometricView.html">光谱叠加（几何视图）</a><span class=rvts2>&nbsp;for a further understanding.</span></p>
