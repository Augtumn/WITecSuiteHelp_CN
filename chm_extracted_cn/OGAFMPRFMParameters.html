<p class=rvps1><span class=rvts2>按照 </span><a class=rvts3 href="OGAFMContactParameters.html">接触模式步骤</a><span class=rvts2> 中的说明操作。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<ul style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li class=rvps1><span class=rvts2>PRFM 是一种接触模式配置，使用探针上的交流电压对压电活性材料进行电激励，并使用锁相放大器分析信号。</span></li>
<li class=rvps1><span class=rvts2>对于压电响应配置，T-B 信号的低通滤波器被禁用。</span></li>
<li class=rvps1><span class=rvts2>请参阅 </span><a class=rvts3 href="WCPiezoresponseControl.html">压电响应控制</a></li>
<li class=rvps1><span class=rvts2>滤波器频率是锁相放大器的一个参数</span></li>
<ul style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li class=rvps1><span class=rvts2>高值导致更多噪声和快速信号响应。</span></li>
<li class=rvps1><span class=rvts2>低值导致信号平滑，但时间延迟更大。</span></li>
<li class=rvps1><span class=rvts2>这会在前向和后向信号之间产生偏移，以及较柔和的边缘。</span></li>
</ul>
<li class=rvps1><span class=rvts2>推荐使用低 I增益。</span></li>
<li class=rvps1><span class=rvts2>驱动频率对结果几乎没有影响。</span><span class=rvts1></span></li>
</ul>
