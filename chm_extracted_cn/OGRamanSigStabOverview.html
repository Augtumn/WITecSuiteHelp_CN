<p class=rvps2><span class=rvts2>信号稳定的目的是在长时间（数小时）测量中补偿由于环境温度变化引起的焦点漂移。</span></p>
<p class=rvps2><span class=rvts2><br></span></p>
<p class=rvps2><span class=rvts3>主题：</span></p>
<ul style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li class=rvps3 style="margin-left: 0; text-indent: 0px"><a class=rvts7 href="OGRamanSigStabProcedure.html">设置</a></li>
<li class=rvps3 style="margin-left: 0; text-indent: 0px"><a class=rvts6 href="OGRamanSigStabHints.html">提示与故障排除</a></li>
</ul>
<p class=rvps1><span class=rvts4><br></span></p>
<p class=rvps2><span class=rvts3>系统要求：</span></p>
<ul style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li class=rvps3 style="margin-left: 0; text-indent: 0px"><span class=rvts2>不适用于RISE（仅适用于仿真模式）和access</span></li>
<li class=rvps3 style="margin-left: 0; text-indent: 0px"><span class=rvts2>高倍物镜 &gt; 10x</span></li>
</ul>
<p class=rvps4><span class=rvts2><br></span></p>
<p class=rvps2><span class=rvts3>适用于所有连续测量模式的图像扫描和大面积扫描：</span></p>
<ul style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li class=rvps3 style="margin-left: 0; text-indent: 0px"><span class=rvts2>图像</span></li>
<li class=rvps3 style="margin-left: 0; text-indent: 0px"><span class=rvts2>深度扫描</span></li>
<li class=rvps3 style="margin-left: 0; text-indent: 0px"><span class=rvts2>堆栈</span></li>
<li class=rvps3 style="margin-left: 0; text-indent: 0px"><span class=rvts2>包括大面积扫描的形貌校正</span></li>
</ul>
<p class=rvps2><span class=rvts2><br></span></p>
<p class=rvps2><span class=rvts3>样品上需要一个参考点，例如：</span></p>
<ul style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li class=rvps3 style="margin-left: 0; text-indent: 0px"><span class=rvts2>样品本身（需要足够的拉曼信号）</span></li>
<li class=rvps3 style="margin-left: 0; text-indent: 0px"><span class=rvts2>硅（例如悬臂梁（图1））</span></li>
<li class=rvps3 style="margin-left: 0; text-indent: 0px"><span class=rvts2>胶带</span></li>
</ul>
