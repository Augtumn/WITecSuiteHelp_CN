<p><img border="0" src="Images/image1825625811.jpg" width="360" height="178"></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts4>曝光</span></p>
<p class=rvps1><span class=rvts2>更改摄像机的曝光时间。这也会改变帧率，最高限制为 25fps（或高分辨率摄像机更低）。</span></p>
<p class=rvps1><span class=rvts4><br></span></p>
<p class=rvps1><span class=rvts4>增益</span></p>
<p class=rvps1><span class=rvts2>更改摄像机的增益。仅在无法使用更长的曝光时间且图像仍然太暗时使用此选项。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts4>色彩模式</span></p>
<p class=rvps1><span class=rvts2>可以在彩色和单色视频图像之间切换。</span></p>
<p class=rvps1><span class=rvts2>此设置也用于视频图像测量（单位图、拼接、焦点堆栈）。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts4>自动白平衡</span></p>
<p class=rvps1><span class=rvts2>按此按钮一次以执行自动白平衡。</span></p>
<p class=rvps2><span class=rvts2>建议使用白色样品，例如特氟龙带。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
