<p class=rvps1><span class=rvts2>在这种成像模式中，探针始终在恒定力下与表面接触。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts4>主题：</span></p>
<ul style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li class=rvps1><a class=rvts6 href="OGAFMContactTheory.html">理论背景</a></li>
<li class=rvps1><a class=rvts7 href="OGAFMContactParameters.html">设置测量</a></li>
<li class=rvps1><a class=rvts8 href="OGAFMContactReferenceSample.html">示例测量</a></li>
</ul>
<p class=rvps4><span class=rvts3><br></span></p>
<p class=rvps1><span class=rvts4>测量模式：</span></p>
<ul style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li class=rvps1><a class=rvts5 href="WCImageScan.html">图像扫描</a><span class=rvts2>：采集AFM接触模式图像</span></li>
<li class=rvps1><a class=rvts5 href="WCLineScan.html">线扫描</a><span class=rvts2>：沿一条线采集力-距离曲线</span></li>
<li class=rvps1><a class=rvts5 href="WCDistanceCurve.html">距离曲线</a><span class=rvts2>：在当前位置采集力-距离曲线</span></li>
</ul>
<p class=rvps2><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts3>推荐的&nbsp;</span><span class=rvts4>悬臂梁：</span></p>
<ul style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li class=rvps1><span class=rvts2>推荐使用弹簧常数k = 0.2 N/m（至少低于1 N/m）的接触模式悬臂梁。</span></li>
</ul>
<p class=rvps3><span class=rvts2>对于柔软或与基底结合较弱的样品，以间歇接触方式运行的&nbsp;</span><a class=rvts5 href="OGAFMACOverview.html">AC模式</a><span class=rvts2>会提供更好的结果。因为在接触模式中，横向力可能导致与基底结合较弱的颗粒被拖动，从而导致图像模糊。</span></p>
<p class=rvps2><span class=rvts2><br></span></p>
