<p class=rvps1><span class=rvts2>物镜补偿向导可用于补偿不同物镜之间的小位移。</span></p>
<p class=rvps1><span class=rvts2>根据 X/Y 样品定位器和 Z 台是否为电动，补偿将在所有三个空间轴上进行。</span></p>
<p class=rvps1><span class=rvts2>要启动物镜补偿向导，请通过&nbsp;</span><a class=rvts4 href="MicroscopeControlMenu.html">主菜单</a><span class=rvts2>&nbsp;打开对话框：</span></p>
<p class=rvps1><img border="0" src="Images/image507836759.jpg" width="340" height="680"></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts2>单击&nbsp;</span><span class=rvts3>帮助</span><span class=rvts2>&nbsp;以查看逐步指导。</span></p>
<p class=rvps1><span class=rvts2>向导显示所有已配置的物镜。可单击某个物镜来选择它，并将 X/Y/Z 轴移动到所需位置（例如样品上的某个特定特征）。</span></p>
<p class=rvps1><span class=rvts2>按&nbsp;</span><span class=rvts3>开始校准</span><span class=rvts2>&nbsp;以告诉软件从现在开始应为每个物镜存储所有偏移。如果要移动样品而不保存位移，请先按停止校准。</span></p>
<p class=rvps1><span class=rvts2>补偿在选择另一个物镜或关闭对话框时自动存储。</span></p>
