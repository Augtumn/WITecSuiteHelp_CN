<p class=rvps1><span class=rvts2>您可以使用上下文菜单项"删除数据"（快捷键 Delete）删除一个或多个选定的数据对象。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts3>注意</span><span class=rvts2>：</span></p>
<ul style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li class=rvps1><span class=rvts2>删除数据对象</span><span class=rvts3>无法</span><span class=rvts2>撤销！</span></li>
<li class=rvps1><span class=rvts2>删除仍被图像或图谱对象使用的变换或解释对象将导致数据丢失，从而导致数据不一致；即数据可能不再能用于可视化或分析。请仅在确定数据对象不再被使用时才删除它们。</span></li>
</ul>
