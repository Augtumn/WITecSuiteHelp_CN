<p class=rvps1><span class=rvts2>如果使用的激光涉及光谱仪更换，请参考第一部分。否则，可以直接跳到第二部分。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps2><span class=rvts3>更换光谱仪</span></p>
<ol style="text-indent: 0px; margin-left: 24px; list-style-position: outside;">
<li value=1 class=rvps3><span class=rvts4>选择要使用的光谱仪的相应&nbsp;</span><a class=rvts6 href="OGRamanConfigurations.html">配置</a><span class=rvts4>。</span></li>
<li value=2 class=rvps3><span class=rvts4>对于非自动化系统：配置使用此光谱仪的光路。</span></li>
<li value=3 class=rvps3><span class=rvts4>上次与该光谱仪一起使用的激光会自动选择。</span></li>
<li value=4 class=rvps3><span class=rvts4>对于非自动化系统：配置此激光的光路。</span></li>
<li value=5 class=rvps3><span class=rvts4>如果要使用不同的激光，请参考下一节。</span></li>
</ol>
<p class=rvps1><span class=rvts5><br></span></p>
<p class=rvps2><span class=rvts3>更换激光</span></p>
<ol style="text-indent: 0px; margin-left: 24px; list-style-position: outside;">
<li value=1 class=rvps3><a class=rvts7 href="LaserControl.html">选择激光</a><span class=rvts4>您想要使用的。</span></li>
<li value=2 class=rvps3><span class=rvts4>对于非自动化系统：配置激光的光路。</span></li>
<li value=3 class=rvps3><span class=rvts4>如有必要：选择适当的光栅（在&nbsp;</span><a class=rvts9 href="WCSpectrograph.html">光谱仪</a><span class=rvts4>&nbsp;部分）。</span></li>
<li value=4 class=rvps3><span class=rvts4>调节光谱中心（在&nbsp;</span><a class=rvts6 href="WCSpectrograph.html">光谱仪</a><span class=rvts4>&nbsp;部分）。</span></li>
</ol>
<p class=rvps1><span class=rvts4><br></span></p>
<p class=rvps1><span class=rvts4>更换光谱仪或激光后，</span><a class=rvts8 href="OGRamanAlignment.html">检查对准</a><span class=rvts4>。</span><span class=rvts1></span></p>
