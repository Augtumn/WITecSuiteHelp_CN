<p class=rvps1><span class=rvts2>图像的每条线都减去一个k阶多项式。多项式的系数通过将多项式拟合到线数据来计算。</span></p>
<p class=rvps4><span class=rvts2><br></span></p>

<p class=rvps2><img border="0" src="Images/image342619383.jpg" width="273" height="145"></p>

<p class=rvps3><span class=rvts3>备注</span></p>
<p class=rvps3><span class=rvts4>平均扣除</span></p>
<p class=rvps3><span class=rvts2>平均扣除是上述公式的一个特例。这里多项式为零阶。多项式是一个常数，等于图像数值的平均值。</span></p>
<p class=rvps3><img border="0" src="Images/Sub%20Average.png" width="512" height="341"></p>
<p class=rvps3><span class=rvts4>平均除法</span></p>
<p class=rvps3><span class=rvts2>不是从线数据中减去平均值，而是将线数据除以平均值。</span></p>
<p class=rvps2><img border="0" src="Images/image2048135974.jpg" width="75" height="48"></p>
<p class=rvps2><img border="0" src="Images/image293649861.jpg" width="105" height="66"></p>
<p class=rvps3><span class=rvts4>斜率扣除</span></p>
<p class=rvps3><span class=rvts2>斜率扣除是上述公式的一个特例。这里多项式为一阶（直线）。</span></p>
<p class=rvps3><img border="0" src="Images/Sub%20Slope.png" width="512" height="341"></p>
<p class=rvps3><span class=rvts4>加权因子</span></p>
<p class=rvps3><span class=rvts2>使用加权因子可确保计算出的斜率平行于某个平坦表面。通常加权因子是由用户设置的布尔掩模。</span></p>
<p class=rvps3><img border="0" src="Images/Sub%20Slope%20with%20Mask.png" width="512" height="341"></p>
<p class=rvps3><span class=rvts2><br></span></p>
