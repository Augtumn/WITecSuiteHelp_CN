<p class=rvps1><span class=rvts2>所有显示设置可以在搜索之前和之后更改。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts3>最低HQI</span></p>

<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts3>最低重叠</span></p>

<p class=rvps1><span class=rvts3><br></span></p>
<p class=rvps1><span class=rvts3>搜索/过滤名称</span></p>
<p class=rvps1><span class=rvts2>可用于按数据库样品名称过滤结果列表。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts3>列排序模式</span></p>
<ul style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li class=rvps1><span class=rvts2>不排序 - 使用搜索光谱的顺序（导入或来自WITec Project/Control）</span></li>
<li class=rvps1><span class=rvts2>最佳HQI - 按最佳结果的HQI排序结果列</span></li>
<li class=rvps1><span class=rvts2>材料名称 - 按最佳结果的材料名称排序结果列</span></li>
<li class=rvps1><span class=rvts2>最佳HQI和材料名称 - 按最佳结果的HQI排序并按材料名称分组</span></li>
</ul>
