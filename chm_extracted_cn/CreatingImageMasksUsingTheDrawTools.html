<div><font size=5 color="#ea7600" face="Microsoft Sans Serif"><b>使用绘图工具创建图像掩模</b></font></div>
<div><font color="#000000" face="Microsoft Sans Serif"><br></font></div>
<div></div>
</font>

<p class=rvps1><span class=rvts2>您可以在任何</span><a class=rvts3 href="ImageViewerOverview.html">图像查看器</a><span class=rvts2>中使用</span><a class=rvts3 href="ImageViewerDrawTools.html">绘图工具</a><span class=rvts2>创建掩模。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts5>步骤</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<ol style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li value=1 class=rvps1><span class=rvts2>打开一个新的图像查看器或选择一个现有的图像查看器</span></li>
</ol>
<p class=rvps1><span class=rvts2><br></span></p>
<ol style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li value=2 class=rvps1><span class=rvts2>通过环形菜单打开绘图工具，并选择所需的绘图工具</span>
<br><img border="0" src="Images/image682760731.jpg" width="546" height="278"></li>
</ol>
<p class=rvps1><span class=rvts2><br></span></p>
<ol style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li value=3 class=rvps1><span class=rvts2>使用鼠标左键在图像上绘制，或在阈值工具中选择阈值</span>
<br><img border="0" src="Images/image1658524189.jpg" width="546" height="279">
<br><span class=rvts4>提示</span><span class=rvts2>：如果掩模用于平均多个光谱，请确保只遮蔽仅包含一种组分的像素。</span></li>
</ol>
<p class=rvps1><span class=rvts2><br></span></p>
<ol style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li value=4 class=rvps1><span class=rvts2>使用图像查看器状态栏中的工具按钮或通过绘图工具环形菜单 &gt; 提取按钮来提取掩模</span></li>
</ol>
<p class=rvps1><span class=rvts2><br></span></p>
<ol style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li value=5 class=rvps1><span class=rvts2>通过按下带有鼠标图标的工具按钮或使用环形菜单向上，切换回鼠标移动模式。</span></li>
</ol>
