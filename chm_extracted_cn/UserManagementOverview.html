<p><span class=rvts2><br></span></p>
<p><span class=rvts2>用户管理提供了允许或拒绝某些用户使用 WITec 软件组件某些功能的可能性。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts2>请从&nbsp;</span><a class=rvts4 href="UserManagementSetup.html">设置</a><span class=rvts2>开始，然后&nbsp;</span><a class=rvts4 href="WITecUserManagerApplication.html">管理用户权限</a><span class=rvts2>。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts3>许可证</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts2>需要特殊的用户管理许可证才能使用它。一旦您订购了用户管理许可证功能，它将包含在 WITec Project 许可证中，可在任意数量的计算机上使用。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts3>缺少用户权限指示</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts2>软件本身通过以下方式指示缺少用户权限：&nbsp;</span></p>
<ul style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li class=rvps1><span class=rvts2>显示带有人像的红色图标</span></li>
<li class=rvps1><span class=rvts2>菜单项使用橙色/红色背景颜色</span></li>
<li class=rvps1><span class=rvts2>显示对话框（例如，点击菜单项时）</span></li>
</ul>
