<p class=rvps1><span class=rvts2>渐晕校正可带来更好的视频图像质量，尤其对于拼接图像。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><img border="0" src="Images/image2289128.jpg" width="466" height="273"></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts3>步长（1/16、1/8、1/4）</span></p>
<p class=rvps1><span class=rvts2>定义自动移动的步长（例如 1/16 视频图像尺寸）。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts3>添加 20/50/100</span></p>
<p class=rvps1><span class=rvts2>自动移动样品定位器并将视频图像添加到当前渐晕校正中。</span></p>
<p class=rvps1><span class=rvts2>只要右侧预览图像中仍有可见结构，就应继续添加图像。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><img border="0" src="Images/image2029144526.jpg" width="30" height="30"><span class=rvts2>&nbsp;</span><span class=rvts3>切换使用渐晕校正</span></p>
<p class=rvps1><span class=rvts2>可激活或停用当前渐晕校正。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><img border="0" src="Images/image808234363.jpg" width="30" height="30"><span class=rvts2>&nbsp;</span><span class=rvts3>删除渐晕校正</span></p>
<p class=rvps1><span class=rvts2>删除当前渐晕校正。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts3>组合/R/G/B（图像）</span></p>
<p class=rvps1><span class=rvts2>显示当前渐晕校正图像。</span>
<br><span class=rvts2>切换到 R/G/B 可查看红/绿/蓝其中一个颜色通道。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><img border="0" src="Images/image1231269783.jpg" width="25" height="25"><span class=rvts2>&nbsp;</span><span class=rvts3>停止测量</span></p>
<p class=rvps1><span class=rvts2>如果当前正在运行，则停止渐晕校正图像测量。</span></p>
