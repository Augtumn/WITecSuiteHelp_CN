<p class=rvps1><span class=rvts2>您可以将以下项目拖放到图谱查看器上：</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<ul style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li class=rvps1><span class=rvts2>图谱对象（在同一查看器中显示和比较多图谱对象）：</span>
<br><span class=rvts2>仅当拖放的对象使用相同的X轴单位类型时才有效</span></li>
</ul>
<p class=rvps1><span class=rvts2><br></span></p>
<ul style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li class=rvps1><span class=rvts2>图谱掩模对象（重复使用之前保存的掩模）：</span>
<br><span class=rvts2>仅当图谱查看器是包含用于操作的掩模的预览时（参见</span><a class=rvts3 href="GraphViewerMaskManipulation.html">图谱查看器掩模操作</a><span class=rvts2>）</span>
<br><span class=rvts2>或图谱查看器处于掩模创建模式时才有效。</span>
<br><span class=rvts2>如果查看器显示多个掩模，拖放掩模时将覆盖鼠标位置下方的掩模。</span></li>
</ul>
