<p class=rvps1><span class=rvts3>描述</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts2>位图导出允许将彩色位图数据对象导出为图形文件格式PNG、BMP、JPG。</span></p>
<p class=rvps1><span class=rvts2>最大位图尺寸为4096 x 4096像素。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts3>输入和输出</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts4>输入：</span></p>
<p class=rvps1><span class=rvts2>一个或多个彩色位图数据对象。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts4>输出：</span></p>
<p class=rvps1><span class=rvts2>一个或多个图形文件。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts3>导出过滤器选项</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts4>保持宽高比：</span></p>
<p class=rvps1><span class=rvts2>如果未设置，结果图像中的像素大小是正方形的。</span></p>
<p class=rvps1><span class=rvts2>如果设置，将考虑彩色位图的变换。当扫描尺寸比例与像素尺寸比例不同时，这样做是有意义的。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts4>文件格式：</span></p>
<p class=rvps1><span class=rvts2>可以为 .bmp、jpeg、png。</span></p>
