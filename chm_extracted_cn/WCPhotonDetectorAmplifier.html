<p class=rvps2><span class=rvts2>此参数组控制放大器，例如用于模拟 PMT 的放大器。参数如下：</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps2><img border="0" src="Images/image1548064751.jpg" width="503" height="141"></p>
<p class=rvps2><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts3>受控放大器</span></p>
<p class=rvps1><span class=rvts2>可以选择放大器。通常情况下只有一个放大器可用。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts3>增益 [V/A]</span></p>
<p class=rvps1><span class=rvts2>此参数定义放大倍数。还可以在低噪声和高速之间进行选择。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts3>带宽 [kHz]</span></p>
<p class=rvps1><span class=rvts2>只读参数，显示根据所选增益确定的带宽（kHz）。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts3>耦合</span></p>
<p class=rvps1><span class=rvts2>此处可以选择 AC 或 DC，具体取决于应放大的电压类型。对于模拟 PMT，应选择 DC。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts3>偏移 [%]</span></p>
<p class=rvps1><span class=rvts2>此参数用于补偿偏移。这是出厂定义的，仅在确实必要时才应更改。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts3>控制电压 [V]</span></p>
<p class=rvps1><span class=rvts2>PMT 的控制电压改变其灵敏度。可以在 0&nbsp;V 到 1.2&nbsp;V 之间调节。</span></p>
