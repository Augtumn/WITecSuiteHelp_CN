<p class=rvps1><span class=rvts3>在视频图像上的拉曼叠加</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<ol style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li value=1 class=rvps1><span class=rvts2>在图像查看器中打开您的视频图像。</span></li>
<li value=2 class=rvps1><span class=rvts2>将您的拉曼图像拖放到图像查看器上，并选择"用作叠加"。</span></li>
<li value=3 class=rvps1><span class=rvts2>在</span><a class=rvts4 href="DropActionImageTransformAndOverlay.html">图像变换和叠加对话框</a><span class=rvts2>中调整叠加。按"提取位图"。</span></li>
</ol>
<p class=rvps1><span class=rvts3><br></span></p>
<p class=rvps1><span class=rvts3>在形貌上的视频图像</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<ol style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li value=1 class=rvps1><span class=rvts2>在图像查看器中打开您的形貌图像。</span></li>
<li value=2 class=rvps1><span class=rvts2>将您的视频图像拖放到形貌上，并选择"用作叠加"。</span></li>
<li value=3 class=rvps1><span class=rvts2>在</span><a class=rvts4 href="DropActionImageTransformAndOverlay.html">图像变换和叠加对话框</a><span class=rvts2>中调整为完全叠加。按"提取位图"。</span></li>
<li value=4 class=rvps1><span class=rvts2>将新位图拖放到显示形貌的图像查看器上，并选择"用作彩色图像"。</span></li>
</ol>
