<p class=rvps1><span class=rvts2>光标用于将鼠标位置（以物理单位表示）从一个软件组件或窗口发送到其他组件或窗口。这允许例如在点击图像查看器中的像素时，在图谱查看器窗口中显示来自光谱图像扫描的对应光谱。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts2>光标对象也用于&nbsp;</span><a class=rvts3 href="ListenCursorMechanism.html">监听光标机制。</a></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts2>光标位置显示在图像查看器和图谱查看器的状态栏中。</span></p>
<p class=rvps1><span class=rvts2>您还可以使用光标管理器窗口（在查看器中按"P"键）查看更详细的光标位置信息。</span></p>
