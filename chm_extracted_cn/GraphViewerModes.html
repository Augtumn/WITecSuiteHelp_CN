<p class=rvps1><span class=rvts2>您可以使用</span><a class=rvts3 href="GraphViewerCircleMenu.html">图谱查看器环形菜单</a><span class=rvts2>打开这些功能。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><img border="0" src="Images/image1342197235.jpg" width="129" height="50"></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts4>鼠标跟随数据：</span></p>
<p class=rvps1><span class=rvts2>如果勾选，光标始终跟随X和Y方向上的精确数据点。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts4>监听所有图谱</span></p>
<p class=rvps1><span class=rvts2>如果勾选，所有多维图谱对象都将监听；即如果在同一查看器中显示两个图像图谱对象，并且您在图像查看器中点击另一个像素，图谱查看器将显示所有图谱数据对象在该位置的相应图谱/光谱。</span></p>
<p class=rvps1><span class=rvts2>您可以关闭此功能来比较多维图谱数据对象的特定单光谱。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><a name="ParametricDisplay"><span class=rvts4>参数显示</span></p>
<p class=rvps1><span class=rvts2>打开参数图。X轴由您激活参数显示时选定的图谱定义。因此只需停用参数显示，选择另一个图谱，然后再次激活它即可更改X轴图谱。</span></p>
<p class=rvps1><span class=rvts2>在</span><a class=rvts3 href="GraphViewerList.html">图谱查看器列表</a><span class=rvts2>中，参数显示中使用的X轴图谱由一个小十字标记：</span></p>
<p class=rvps1><img border="0" src="Images/image73427236.jpg" width="190" height="67"><span class=rvts2></span></p>
