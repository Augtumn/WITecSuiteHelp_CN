<p class=rvps1><span class=rvts2>在拉曼图像扫描测量期间或之后，您可以使用滤波器查看器创建图像。</span></p>
<p class=rvps1><span class=rvts4>提示：在 WITec Control 中，启动图像扫描或大面积扫描时可能会自动创建滤波器查看器。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts2>滤波器查看器帮助您找到感兴趣的拉曼谱带，并创建显示各组分结构的图像。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts3>步骤</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<ol style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li value=1 class=rvps1><span class=rvts2>将拉曼图像数据对象拖放到滤波器查看器拖放操作上</span>
<br><span class=rvts2></span>
<br><img border="0" src="Images/image294229524.jpg" width="221" height="130">
<br><span class=rvts2><br></span></li>
<li value=2 class=rvps1><span class=rvts2>添加新的求和滤波器</span>
<br><span class=rvts2><br></span></li>
<li value=3 class=rvps1><span class=rvts2>选择一个求和滤波器以更改滤波器参数（位置、宽度、背景扣除，...）</span>
<br><span class=rvts2></span>
<br><img border="0" src="Images/image1278398076.jpg" width="442" height="187">
<br><img border="0" src="Images/image405386599.jpg" width="442" height="224">
<br><span class=rvts2><br></span></li>
<li value=4 class=rvps1><span class=rvts2>您可以使用"提取"和"全部"按钮提取当前选定的滤波器图像或所有滤波器。</span></li>
</ol>
