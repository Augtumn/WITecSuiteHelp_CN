<ul style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li class=rvps1><span class=rvts2>荧光寿命测量的工作方式与使用WITec仪器的所有其他光谱测量基本相同。唯一的区别：记录的是时间光谱，而不是例如拉曼或荧光光谱。</span></li>
<li class=rvps1><span class=rvts2>FLIM测量是一种2D甚至3D扫描，其中显示的是荧光寿命，而不是拉曼强度或类似值。</span></li>
<li class=rvps1><span class=rvts2>甚至所有从共聚焦拉曼光谱和成像中已知的其它程序在FLIM中也是可行的：单光谱、线扫描、图像扫描和大面积扫描，同样支持3D。</span></li>
<li class=rvps1><span class=rvts2>如上所述，FLIM图像中可视化的参数是来自</span><a class=rvts3 href="OGStrobeLockTheory.html">理论</a><span class=rvts2>部分方程中的衰减时间。可以通过使用</span><a class=rvts3 href="DropActionAdvancedFittingTool.html">高级拟合工具</a><span class=rvts2>并选择单（或多）指数函数来描述测量的时间光谱来获得该时间。</span></li>
</ul>
