<p class=rvps1><span class=rvts2>如果您想为每个组分创建一个良好、无噪声的光谱，对同一组分的多个光谱进行平均是一种合适的方法。</span></p>
<p class=rvps1><span class=rvts2>为此，您需要执行以下步骤：</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<ol style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li value=1 class=rvps1><a class=rvts3 href="CreatingImageMasksOverview.html">为每个组分创建图像掩模</a><span class=rvts2>。</span>
<br><span class=rvts2></span>
<br><img border="0" src="Images/image622403953.jpg" width="263" height="126"><img border="0" src="Images/image623100448.jpg" width="263" height="126"><img border="0" src="Images/image395048512.jpg" width="263" height="126"></li>
</ol>
<p class=rvps1><span class=rvts2><br></span></p>
<ol style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li value=2 class=rvps1><span class=rvts2>有了这些掩模后，您可以选择掩模与光谱拉曼图像数据集，并将其拖放到</span><a class=rvts3 href="AverageSpectrum.html">平均光谱</a><span class=rvts2>拖放操作上：</span>
<br><span class=rvts2></span>
<br><img border="0" src="Images/image2019383314.jpg" width="183" height="272">
<br><span class=rvts2><br></span></li>
</ol>
