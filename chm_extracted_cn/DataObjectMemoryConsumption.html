<p class=rvps1><span class=rvts2>数据对象所需的内存大小取决于扫描的维度/大小：</span></p>
<p class=rvps1><span class=rvts2></span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts2>大小（字节） = 每行像素数 × 图像行数 × 通道数 × 4 [字节]</span></p>
<p class=rvps1><span class=rvts2>大小（MB） = 大小 / 1024 / 1024</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts2>示例：</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts2>拉曼图像扫描，128 x 128个光谱（CCD相机，1024通道）：</span></p>
<p class=rvps1><span class=rvts2>大小 = 128 × 128 × 1024 × 4 = 64 MB</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts2>AFM图像扫描，512 x 512像素，4通道（T-B、R-L、Aux1、Aux2）：</span></p>
<p class=rvps1><span class=rvts2>大小 = 512 × 512 × 4 × 4 = 4 MB</span></p>
<p class=rvps1><span class=rvts2></span></p>
