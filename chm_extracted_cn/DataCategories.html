<p class=rvps1><span class=rvts2>使用环形菜单（按住鼠标右键）快速访问某些功能：</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><img border="0" src="Images/image1443961016.jpg" width="471" height="206"></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts3>所有对象</span></p>
<p class=rvps1><span class=rvts2>显示图像、图谱和文本对象。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts3>切换排序模式</span></p>
<p class=rvps1><span class=rvts2>在排序模式之间切换：</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<ul style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li class=rvps1><span class=rvts2>按索引排序（最新的数据对象在列表底部）</span></li>
<li class=rvps1><span class=rvts2>按名称排序</span></li>
<li class=rvps1><span class=rvts2>按类别排序</span></li>
</ul>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts2>（您也可以点击项目管理器列表框的"名称"标题来更改排序类型。）</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts3>数据类别</span></p>
<p class=rvps1><span class=rvts2>打开一个对话框，用于更改数据类别的可见性和排序模式。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts3>操作</span></p>
<p class=rvps1><span class=rvts2>如果选择了数据对象，可以对其执行某些操作（请参阅</span><a class=rvts4 href="DropActionsWindow.html">拖放操作窗口）</a><span class=rvts2>。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts3>仅文本</span></p>
<p class=rvps1><span class=rvts2>仅显示文本对象。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts3>仅图谱</span></p>
<p class=rvps1><span class=rvts2>仅显示图谱对象。</span></p>
<p class=rvps1><span class=rvts3><br></span></p>
<p class=rvps1><span class=rvts3>仅图像</span></p>
<p class=rvps1><span class=rvts2>仅显示图像对象。</span></p>
