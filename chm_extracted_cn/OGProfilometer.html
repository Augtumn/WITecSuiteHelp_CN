<p class=rvps2><span class=rvts2>轮廓仪是一种配置，用于使用TrueSurface Mk1或Mk2的共聚焦色度传感器仅记录形貌。此配置也可用于TrueSurface Mk3。</span></p>
<p class=rvps2><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts3>测量模式：</span></p>
<ul style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li class=rvps1><a class=rvts5 href="WCOscilloscope.html">示波器</a><span class=rvts2>：显示当前值</span></li>
<li class=rvps1><a class=rvts5 href="WCImageScan.html">图像扫描</a><span class=rvts2>：使用压电扫描器采集轮廓仪扫描</span></li>
<li class=rvps1><a class=rvts5 href="WCLargeAreaScan.html">大面积扫描</a><span class=rvts2>：使用十字工作台采集轮廓仪扫描</span></li>
</ul>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts3>系统要求：</span></p>
<ul style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li class=rvps1><span class=rvts2>TrueSurface Mk1或Mk2</span></li>
</ul>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts3>步骤：</span></p>
<ol style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li value=1 class=rvps1><a class=rvts6 href="OGFocusOnSample.html">对焦</a><span class=rvts4>样品的最高点和最低点之间。</span></li>
<li value=2 class=rvps1><a class=rvts6 href="ObjectiveSelection.html">切换</a><span class=rvts4>到TrueSurface物镜。</span></li>
<li value=3 class=rvps1><span class=rvts4>对于非自动化系统：配置TrueSurface光路。</span></li>
<li value=4 class=rvps1><span class=rvts4>定义并开始大面积扫描或图像扫描。</span><span class=rvts1></span></li>
</ol>
