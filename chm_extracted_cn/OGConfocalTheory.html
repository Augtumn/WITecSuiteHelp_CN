<p class=rvps1><span class=rvts2>共聚焦显微镜的原理可在</span><a class=rvts3 href="OGConfocality.html">通用章节</a><span class=rvts2>中找到。</span></p>
<p class=rvps1><span class=rvts2>要充分利用共聚焦显微镜的横向和深度分辨率，必须正确选择针孔尺寸（检测用多模光纤的纤芯直径）。</span></p>
<p class=rvps1><span class=rvts2>最佳针孔直径取决于显微镜物镜的光学特性以及所用波长，可以使用以下公式计算：</span></p>
<p class=rvps2><img border="0" src="Images/image2121705516.jpg" width="86" height="38"></p>
<p class=rvps1><span class=rvts2>其中</span><span class=rvts5>&#955;</span><span class=rvts2>是激光的波长，</span><span class=rvts4>M</span><span class=rvts2>是放大倍率，</span><span class=rvts4>NA</span><span class=rvts2>是显微镜物镜的数值孔径。</span></p>
<p class=rvps1><span class=rvts2>参数</span><span class=rvts4>v</span><span class=rvts2>以光学坐标给出，对于最佳深度分辨率应为2.5，对于最大横向分辨率应为0.5。如果选择</span><span class=rvts4>v</span><span class=rvts2>&nbsp;&lt; 0.5，则横向分辨率将比传统显微镜提高&#8730;2&nbsp;&#8776;&nbsp;1.4倍。然而，在这种情况下，大部分从样品反射的光无法到达探测器，因此会牺牲效率。</span></p>
