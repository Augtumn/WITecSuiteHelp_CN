<p class=rvps1><span class=rvts4>如何可视化</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts2>您可以通过在</span><a class=rvts3 href="ProjectManagerOverview.html">项目管理器</a><span class=rvts2>中的</span><span class=rvts6>数据对象</span><span class=rvts2>上</span><span class=rvts6>双击</span><span class=rvts2>来可视化数据对象。</span></p>
<p class=rvps1><span class=rvts2>也可以先选择一个或多个数据对象，然后按</span><span class=rvts6>Enter 键</span><span class=rvts2>。</span></p>
<p class=rvps1><span class=rvts2><br></span></p>

<p class=rvps1><span class=rvts2><br></span></p>
<p class=rvps1><span class=rvts2>有不同类型的查看器用于显示图像、位图、图谱和文本对象：</span></p>
<p class=rvps1><span class=rvts2><br></span></p>
<ul style="text-indent: 0px; margin-left: 48px; list-style-position: outside;">
<li class=rvps1><a class=rvts7 href="ImageViewerOverview.html">图像查看器</a>
<br><span class=rvts2></span>
<br><span class=rvts2>以伪彩色图像形式显示浮点图像和位图。</span>
<br><span class=rvts2></span>
<br><img border="0" src="Images/image1941892082.jpg" width="183" height="210">
<br><span class=rvts2><br></span></li>
</ul>
<p class=rvps1><span class=rvts2><br></span></p>

<br><span class=rvts2></span>

</ul>
