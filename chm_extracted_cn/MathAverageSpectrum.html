<p class=rvps3><span class=rvts3>备注</span></p>
<p class=rvps3><span class=rvts4>无加权</span></p>
<p class=rvps3><span class=rvts2>如果不使用加权，则加权因子等于 1。在这种情况下，加权和等于光谱的数量。</span></p>
<p class=rvps3><span class=rvts4>布尔加权</span></p>
<p class=rvps3><span class=rvts2>在大多数情况下，加权因子由用户或某个算法设置的掩模给出。在这种情况下，如果掩模被设置，加权因子等于 1；如果掩模未被设置，加权因子等于 0。加权因子之和等于掩模选择的光谱数量。</span></p>
